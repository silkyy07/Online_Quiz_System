<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Based Quiz Application</title>
    <!-- Importing a fun, handwritten-style font (Kalam) and a more structured display font (Fredoka) -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Kalam:wght@700&display=swap" rel="stylesheet" />
    <style>
           :root {
        --primary-color: #ff6b6b; /* Coral */
        --secondary-color: #f06595; /* Pink */
        --accent-color: #4ecdc4; /* Teal */
        --background-light: #f7f3e8; /* Off-White/Paper */
        --container-bg: #ffffff;
        --text-dark: #2c3e50; /* Dark Blue/Black */
        --doodle-color: var(--text-dark);
        
        --score-current-color: #f7a0a0; /* Light Red/Pink for current score */
        --score-high-color: #2ecc71; /* Green for high score */
      }

      body {
        font-family: 'Fredoka', sans-serif;
        margin: 0;
        padding: 40px 20px;
        color: var(--text-dark);
        background: var(--background-light);
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        position: relative;
        overflow-x: hidden;
      }

      
      body::before {
        content: '';
        position: absolute;
        top: 30px;
        left: 5%;
        width: 100px;
        height: 100px;
        border: 8px dashed var(--primary-color);
        border-radius: 50%;
        opacity: 0.4;
        z-index: -1;
      }
      
     
      body::after {
        content: '💡';
        font-size: 70px;
        position: absolute;
        bottom: 5%;
        right: 15%;
        opacity: 0.5;
        transform: rotate(15deg);
        z-index: -1;
      }

      h1 {
        font-family: 'Kalam', cursive;
        font-size: clamp(2.5em, 5vw, 3.5em); /* Responsive font size */
        text-align: center;
        color: var(--primary-color);
        margin-bottom: 5px; /* Adjust spacing for subtitle */
        text-shadow: 3px 3px 0px var(--secondary-color), 
                     5px 5px 0px rgba(0,0,0,0.1);
        transform: rotate(-2deg);
      }
      
      h2 {
        font-size: clamp(1.5em, 4vw, 2em);
        text-align: center;
        color: var(--text-dark);
        margin-bottom: 25px;
        position: relative;
        padding-bottom: 10px;
      }

      .subtitle {
          font-family: 'Fredoka', sans-serif;
          font-size: 1.2em;
          margin-top: 0;
          margin-bottom: 30px;
          color: var(--text-dark);
          transform: rotate(1deg);
          text-shadow: none;
      }

      .main-heading::after { /* Main H2 separator for Quiz/Setup page */
        content: '';
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 4px;
        background: var(--accent-color);
        border-radius: 2px;
      }

      /* --- CONTAINER STYLES (The 'Paper') --- */
      .container {
        width: 100%;
        max-width: 700px;
        margin: 15px auto;
        background: var(--container-bg);
        padding: clamp(20px, 5vw, 30px); /* Responsive padding */
        border-radius: 15px;
        box-shadow: 10px 10px 0px var(--secondary-color), 
                    15px 15px 0px rgba(0, 0, 0, 0.1);
        border: 4px solid var(--doodle-color);
        transition: transform 0.3s;
      }

      /* --- INPUTS & LABELS --- */
      label {
        display: block;
        margin: 15px 0 5px;
        font-weight: 600;
        font-size: 1.1em;
      }
      
      .doodle-emoji {
          font-family: 'Kalam', cursive;
          font-size: 1.5em;
          margin-right: 10px;
      }

      input[type='text'], select {
        width: 100%; /* Full width for mobile */
        padding: 10px;
        margin-bottom: 15px;
        border: 2px solid var(--doodle-color);
        border-radius: 8px;
        background-color: var(--background-light);
        transition: border-color 0.3s;
        font-family: 'Fredoka', sans-serif;
        font-size: 1em;
        box-sizing: border-box; /* Include padding/border in element's total width/height */
      }

      input[type='text']:focus, select:focus {
        border-color: var(--primary-color);
        outline: none;
        box-shadow: 0 0 0 3px var(--primary-color);
      }

      /* --- BUTTONS (CTA) --- */
      button {
        padding: 15px 30px;
        margin-top: 30px;
        background: var(--primary-color);
        color: var(--container-bg);
        font-size: 1.2em;
        font-weight: 700;
        border: 3px solid var(--doodle-color);
        border-radius: 50px;
        cursor: pointer;
        display: block;
        width: 80%; /* Responsive width */
        max-width: 350px;
        margin-left: auto;
        margin-right: auto;
        transition: all 0.2s ease-in-out;
        box-shadow: 5px 5px 0px var(--accent-color);
        transform: rotate(1deg);
      }

      button:hover {
        transform: translate(-2px, -2px);
        box-shadow: 7px 7px 0px var(--secondary-color);
        background: var(--secondary-color);
      }

      /* --- QUIZ MODULE STYLES --- */
      #timer {
        font-family: 'Kalam', cursive;
        font-size: clamp(1.8em, 5vw, 2.5em);
        font-weight: 700;
        color: var(--primary-color);
        background: var(--background-light);
        border: 3px dashed var(--doodle-color);
        display: block;
        padding: 10px 20px;
        border-radius: 15px;
        margin-bottom: 25px;
        text-align: center;
        transition: color 0.5s;
      }
      
      .timer-low {
          color: #e74c3c !important; /* Use hard error color here */
          animation: pulse 1s infinite;
      }

      @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.03); }
        100% { transform: scale(1); }
      }

      .question {
        background: var(--background-light);
        padding: 20px;
        margin: 20px 0;
        border-radius: 12px;
        border: 2px solid var(--doodle-color);
        box-shadow: 4px 4px 0px var(--accent-color);
        transition: all 0.2s;
        transform: rotate(0.5deg);
      }
      
      .question:hover {
          transform: rotate(0deg) scale(1.01);
          box-shadow: 6px 6px 0px var(--secondary-color);
      }

      .question strong {
          font-size: 1.2em;
          color: var(--primary-color);
          display: block;
          margin-bottom: 10px;
      }
      
      .question-content {
          display: flex;
          justify-content: space-between;
          align-items: flex-start;
          flex-wrap: wrap; /* Ensure responsiveness */
      }

      .question-options {
          flex-grow: 1;
      }
      
      .question-image {
          flex-shrink: 0;
          margin-left: 20px;
          max-width: 150px;
          height: auto;
          border-radius: 8px;
          box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
          object-fit: cover;
      }

      @media (max-width: 600px) {
          .question-content {
              flex-direction: column;
          }
          .question-image {
              margin: 10px 0 0 0;
              max-width: 100%;
          }
      }

	#result {
        text-align: center;
        font-size: 1.3em;
        padding: 15px 0;
        line-height: 1.8;
      }

      /* New Player Info Card for clean separation */
      .player-info-card {
        background: var(--background-light);
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 25px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        border: 1px solid #ddd;
        font-size: 1.1em;
        font-weight: 500;
        line-height: 1.5;
      }
      .player-info-card strong {
          color: var(--text-dark); /* Ensure contrast */
      }
      
      .score-summary {
          display: flex;
          justify-content: space-around;
          align-items: center;
          gap: 15px;
          margin: 30px 0;
          padding: 20px 10px;
          background: #f0f8ff; /* Light blue background for clean look */
          border-radius: 10px;
          border: 3px solid var(--accent-color);
          box-shadow: 4px 4px 0px var(--secondary-color);
          flex-wrap: wrap; 
      }

      .score-box {
          padding: 10px 10px; /* Reduced padding */
          border-radius: 8px;
          min-width: 120px; /* Reduced min-width */
          text-align: center;
          border: 2px solid var(--text-dark);
          box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15), 4px 4px 0px var(--text-dark); 
          transition: transform 0.2s, box-shadow 0.2s;
          flex: 1 1 45%; 
          max-width: 180px; /* Reduced max width */
      }

      .score-box:hover {
          transform: translateY(-3px);
          box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2), 6px 6px 0px var(--text-dark);
      }
      
      @media (max-width: 500px) {
          .score-box {
              flex: 1 1 100%; 
          }
      }

           .score-box-current {
          background: linear-gradient(135deg, var(--score-current-color), #e77676);
          color: var(--text-dark); /* Dark text for contrast on light red */
          border: 2px solid #e77676;
          box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15), 4px 4px 0px #e77676;
      }

      /* High Score: Green Gradient */
      .score-box-high {
          background: linear-gradient(135deg, var(--score-high-color), #24a85f);
          color: white; /* White text for contrast on dark green */
          border: 2px solid #1e7e34;
          box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15), 4px 4px 0px #1e7e34;
      }

      .score-box p {
          margin: 0;
          font-size: 1.8em; /* Reduced size */
          font-family: 'Kalam', cursive;
          font-weight: 700;
          text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.1); /* Dark text shadow for contrast */
      }


      #result strong {
          color: var(--primary-color);
          font-weight: 700;
      }
      
      #result em {
          display: block;
          margin-top: 20px;
          font-style: italic;
          font-family: 'Kalam', cursive;
          font-size: 1.3em; /* Smaller font size as requested */
          color: #444; /* Light black color as requested */
      }
      
      .review {
        background: #fff8e1;
        padding: 20px;
        border-radius: 12px;
        margin-top: 30px;
        box-shadow: 6px 6px 0px var(--primary-color);
        border: 3px solid var(--doodle-color);
        text-align: left;
      }
      
      .review h3 {
          color: var(--text-dark);
          font-family: 'Kalam', cursive;
          font-size: 1.5em;
          margin-top: 0;
      }

      .review p {
          border-bottom: 1px dashed #ccc;
          padding-bottom: 10px;
      }
      
      .correct {
        color: var(--score-high-color); /* Using high score green */
        font-weight: 600;
      }

      .wrong {
        color: #e74c3c; /* Use error red */
        font-weight: 600;
      }
      
    </style>
  </head>
  <body>
    <h1>Web Based Quiz Application</h1>
    <!-- Subtitle: Change this name manually! -->
    <h2 class="subtitle">- By Silky Jha</h2>
    <div class="container" id="setup">
      <h2 class="main-heading"><span class="doodle-emoji">👋</span> Let's Start the Quiz!</h2>
      
      <label for="username"><span class="doodle-emoji">✏️</span> Enter Your Name:</label>
      <input type="text" id="username" placeholder="e.g., Quiz Master Sam" />

       <label for="timerSelect"><span class="doodle-emoji">⏱️</span> Select Timer:</label>
      <select id="timerSelect">
        <option value="60">60 seconds </option>
        <option value="90">90 seconds </option>
        <option value="120">120 seconds </option>
      </select>

      <label for="levelSelect"><span class="doodle-emoji">🌟</span> Select Level:</label>
      <select id="levelSelect">
        <option value="easy">Easy (Warm-up)</option>
        <option value="medium">Medium (Good Test)</option>
        <option value="hard">Hard (Brain Buster)</option>
      </select>

      <button onclick="startQuiz()">Start Quiz</button>
    </div>

    <div class="container" id="quizContainer" style="display: none;">
      <div id="timer">Time Left: </div>
      <div id="quiz">
        <!-- Questions will be dynamically inserted here -->
      </div>
      <button onclick="submitQuiz()">Submit Answers</button>
    </div>

    <div class="container" id="resultContainer" style="display: none;">
      <h2><span class="doodle-emoji">🏆</span> Scoreboard</h2>
      <div id="result">
        <!-- Results will be dynamically inserted here -->
      </div>
      <button onclick="location.reload()">Play Another Quiz</button>
    </div>

    <script>
   
      
      const questions = [

        { level: 'easy', q: 'Who won the 2019 Cricket World Cup?', options: ['India', 'Australia', 'England', 'New Zealand'], answer: 'England', img: 'https://images.unsplash.com/photo-1637203723757-a9b26181e1ad?fm=jpg&q=60&w=3000&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8d29ybGQlMjBjdXAlMjB0cm9waHl8ZW58MHx8MHx8fDA%3D' },
        { level: 'easy', q: 'Which color is not typically found in a rainbow?', options: ['Red', 'Indigo', 'Black', 'Green'], answer: 'Black', img: 'https://upload.wikimedia.org/wikipedia/commons/6/6e/Rainbow_with_sunlight.jpg' },

        { level: 'easy', q: 'What is the freezing point of water in Celsius?', options: ['100', '32', '0', '-10'], answer: '0', img: 'https://static.vecteezy.com/system/resources/thumbnails/008/468/264/small_2x/isolated-clean-water-blue-drop-illustration-vector.jpg' },

        { level: 'easy', q: 'What is the main ingredient in bread?', options: ['Sugar', 'Flour', 'Milk', 'Eggs'], answer: 'Flour', img: 'https://assets.bonappetit.com/photos/5c62e4a3e81bbf522a9579ce/1:1/pass/milk-bread.jpg' },
        { level: 'easy', q: 'How many days are in a leap year?', options: ['360', '365', '366', '364'], answer: '366', img: 'https://media.istockphoto.com/id/181866332/photo/red-wall-calendar.jpg?s=612x612&w=0&k=20&c=FpWwH-rY03pLmNsibkcJ_zbnqCIx1sbI5pRsQ9q5yLg=' },
        { level: 'easy', q: 'What object is used to hit a baseball?', options: ['Stick', 'Club', 'Racket', 'Bat'], answer: 'Bat', img: 'https://upload.wikimedia.org/wikipedia/commons/0/03/Baseball_bat_and_ball.jpg' },

        { level: 'medium', q: 'Which element has the chemical symbol "O"?', options: ['Gold', 'Oxygen', 'Iron', 'Carbon'], answer: 'Oxygen'},
        { level: 'medium', q: 'What is the longest river in the world?', options: ['Amazon', 'Yangtze', 'Nile', 'Mississippi'], answer: 'Nile', img: 'https://images.pexels.com/photos/2438/nature-forest-waves-trees.jpg?cs=srgb&dl=pexels-pixabay-2438.jpg&fm=jpg' },

      // --- QUIZ LOGIC ---
      let username = '',
        level = '',
        timeLeft = 0,
        timer,
        selected = [];
      
      const TOTAL_QUESTIONS_PER_QUIZ = 10; 

      function customAlert(message) {
          // Replaces native alert() with a modal/message box style
          let alertBox = document.getElementById('customAlert');

          if (!alertBox) {
              alertBox = document.createElement('div');
              alertBox.id = 'customAlert';
              alertBox.style.cssText = `
                  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
                  background: #e74c3c; color: white; padding: 20px; 
                  border-radius: 10px; z-index: 1000; box-shadow: 0 0 10px rgba(0,0,0,0.5);
                  font-family: 'Fredoka', sans-serif; font-size: 1.2em;
                  border: 3px solid var(--text-dark); text-align: center;
              `;
              document.body.appendChild(alertBox);
              setTimeout(() => {
                  if (document.body.contains(alertBox)) {
                      document.body.removeChild(alertBox);
                  }
              }, 3000);
          }
          alertBox.textContent = message;
      }

      function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      }

      function startQuiz() {
        username = document.getElementById('username').value.trim();
        level = document.getElementById('levelSelect').value;
        timeLeft = parseInt(document.getElementById('timerSelect').value);
        
        if (username === '') {
          customAlert('Please enter your name to start the quiz!');
          document.getElementById('username').focus();
          return;
        }

        let pool = questions.filter((q) => q.level === level);
        
        // Select 10 random questions from the pool
        const numQuestions = Math.min(TOTAL_QUESTIONS_PER_QUIZ, pool.length);
        selected = shuffle(pool).slice(0, numQuestions); 
        
        document.getElementById('setup').style.display = 'none';
        document.getElementById('quizContainer').style.display = 'block';
        
        displayQuestions();
        startTimer();
      }

      function displayQuestions() {
        const quizDiv = document.getElementById('quiz');
        quizDiv.innerHTML = '';
        selected.forEach((item, i) => {
          // Since all items have an 'img' property now, this will always include an image.
          const imageHtml = item.img ? `<img src="${item.img}" alt="Context Image" class="question-image" onerror="this.style.display='none'; this.parentElement.style.flexDirection='column';">` : '';
          
          quizDiv.innerHTML += `
            <div class="question">
                <strong>Q${i + 1}: ${item.q}</strong>
                <div class="question-content">
                    <div class="question-options">
                        ${item.options.map(opt => ` 
                          <label>
                            <input type="radio" name="q${i}" value="${opt}"> 
                            ${opt}
                          </label>`).join('')}
                    </div>
                    ${imageHtml}
                </div>
            </div>`;
        });
      }

      function startTimer() {
        const timerElement = document.getElementById('timer');
        timerElement.textContent = `Time Left: ${timeLeft} sec`;
        timerElement.classList.remove('timer-low');

        if (timer) clearInterval(timer); 

        timer = setInterval(() => {
          timeLeft--;
          timerElement.textContent = `Time Left: ${timeLeft} sec`;

          if (timeLeft <= 10) { 
              timerElement.classList.add('timer-low');
          }

          if (timeLeft <= 0) {
            clearInterval(timer);
            submitQuiz();
            customAlert('Time is up! Submitting your answers.');
          }
        }, 1000);
      }

      function submitQuiz() {
        clearInterval(timer);
        let score = 0;
        let wrong = [];
        const totalQuestions = selected.length;
        
        selected.forEach((item, i) => {
          const selectedOption = document.querySelector(`input[name="q${i}"]:checked`);
          
          if (selectedOption && selectedOption.value === item.answer) {
            score++;
          } else {
            wrong.push({
              q: item.q,
              correct: item.answer,
              your: selectedOption ? selectedOption.value : 'No answer selected',
            });
          }
        });
        
        let percent = (score / totalQuestions) * 100;
        let quote;

        // Motivational Quote Logic
        if (percent === 100) {
            quote = "Perfect Score! You're a true genius! 🎉";
        } else if (percent >= 80) {
            quote = "Excellent job! You're a quiz master in the making! 🌟";
        } else if (percent >= 50) {
            quote = "Good effort! Keep practicing, every mistake is a lesson! 💪";
        } else {
            // Lowest tier quote
            quote = "Every quiz is a chance to learn something new! 🚀";
        }

        // High Score Logic
        let key = `highscore_${level}_${username.replace(/\s/g, '_')}`; 
        let prev = parseInt(localStorage.getItem(key)) || 0;
        let newHighScore = Math.max(score, prev);
        if (score > prev) {
            localStorage.setItem(key, score);
        }
        
        // Review of Wrong Answers
        let wrongHTML = wrong.length === 0 ? 
          `<p class='correct'><span class='doodle-emoji'>✅</span> You got all ${totalQuestions} questions right! Absolutely amazing!</p>` :
          `<div class='review'>
            <h3><span class='doodle-emoji'>📝</span> Review Your Answers:</h3>
            ${wrong.map(w =>
              `<p>
                <strong>Q:</strong> ${w.q}<br />
                <span class="wrong">Your Answer: ${w.your}</span><br />
                <span class="correct">Correct Answer: ${w.correct}</span>
              </p>`
            ).join('')}
          </div>`;

        // Display Results with new Scoreboard structure
        document.getElementById('quizContainer').style.display = 'none';
        document.getElementById('resultContainer').style.display = 'block';
        document.getElementById('result').innerHTML = `
          <div class="player-info-card">
            Player: <strong>${username}</strong><br />
            Level: <strong>${level.toUpperCase()}</strong>
          </div>

          <div class="score-summary">
            <div class="score-box score-box-current">
              <h4>Your Score</h4>
              <p>${score} / ${totalQuestions}</p>
            </div>
            <div class="score-box score-box-high">
              <h4>High Score</h4>
              <p>${newHighScore} / ${totalQuestions}</p>
            </div>
          </div>

          <em>"${quote}"</em><br />
          ${wrongHTML}`;
      }
    </script>
